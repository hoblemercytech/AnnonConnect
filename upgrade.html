<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifetime VIP – One Time Payment Forever</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>


  <style>
    :root {
      --gold: #fbbf24;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --green: #10b981;
      --dark-bg: #0f0f23;
      --card-bg: rgba(30,27,75,0.92);
      --text: #ffffff;
      --muted: #cbd5e1;
    }

    /* LIGHT MODE – GORGEOUS & FULLY RESTYLED */
    body.light-mode {
      --dark-bg: #f8fafc;
      --card-bg: rgba(255,255,255,0.96);
      --text: #1e293b;
      --muted: #64748b;
      background: linear-gradient(135deg, #fef3c7, #fde68a, #fde68a);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', 'Cabinet Grotesk', sans-serif;
      background: linear-gradient(135deg, #0f0f23, #1e1b4b, #2d1b69);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 0;
      text-align: center;
      transition: background 0.6s ease;
    }

    /* ================= MAIN CARD ================= */
    .container {
      max-width: 460px;
      margin: 0 auto;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      border: 1px solid rgba(251,191,36,0.3);
      position: relative;
      padding-bottom: 50px;
    }
    body.light-mode .container {
      box-shadow: 0 25px 70px rgba(139,92,246,0.18);
      border: 1px solid rgba(251,191,36,0.25);
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 7px;
      background: linear-gradient(90deg, var(--gold), var(--pink));
      border-radius: 32px 32px 0 0;
    }

    header { padding: 70px 24px 50px; }
    .crown {
      font-size: 110px;
      color: var(--gold);
      filter: drop-shadow(0 12px 35px rgba(251,191,36,0.6));
      animation: float 5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    h1 {
      font-size: 42px;
      margin: 20px 0;
      background: linear-gradient(90deg, #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
    }
    body.light-mode h1 {
      background: linear-gradient(90deg, #7c3aed, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: white;
      padding: 14px 34px;
      border-radius: 50px;
      font-weight: 900;
      display: inline-block;
      margin: 18px 0;
      font-size: 19px;
      letter-spacing: 1px;
    }

    /* ================= FEATURES ================= */
    .features { padding: 0 32px; margin: 35px 0; }
    .feature {
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 22px;
      margin: 16px 0;
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 17px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
    }
    body.light-mode .feature {
      background: rgba(139,92,246,0.08);
      border: 1px solid rgba(139,92,246,0.18);
    }

    .feature i {
      font-size: 34px;
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--gold), #f59e0b);
      color: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(251,191,36,0.5);
      font-weight: bold;
    }

    /* ================= PRICE BOX ================= */
    .price-box {
      margin: 35px 32px;
      padding: 30px;
      background: rgba(251,191,36,0.15);
      border-radius: 28px;
      border: 2px dashed var(--gold);
      backdrop-filter: blur(10px);
    }
    body.light-mode .price-box {
      background: rgba(251,191,36,0.22);
    }

    .old-price {
      font-size: 30px;
      text-decoration: line-through;
      opacity: 0.6;
      margin-bottom: 12px;
    }
    .price {
      font-size: 78px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 10px 35px rgba(251,191,36,0.7);
      letter-spacing: -2px;
    }

    /* ================= PAY BUTTON ================= */
    .btn-pay {
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: white;
      border: none;
      width: 88%;
      padding: 26px;
      font-size: 26px;
      font-weight: 900;
      border-radius: 50px;
      cursor: pointer;
      margin: 35px auto;
      box-shadow: 0 20px 50px rgba(139,92,246,0.7);
      display: block;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .btn-pay:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 60px rgba(139,92,246,0.8);
    }

    .info {
      margin: 35px 32px;
      padding: 28px;
      background: rgba(16,185,129,0.15);
      border-radius: 24px;
      border: 1px solid rgba(16,185,129,0.3);
      font-size: 17px;
      line-height: 1.9;
    }
    body.light-mode .info {
      background: rgba(16,185,129,0.12);
      color: #1e293b;
    }

    /* ================= MODAL ================= */
    #modalContainer {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      backdrop-filter: blur(18px);
      display: none; flex-direction: column; gap: 20px;
      padding: 20px; overflow-y: auto;
      align-items: center; justify-content: flex-start;
      z-index: 9999;
    }
    #modalContainer.active { display: flex; }

    .payment-modal {
      background: linear-gradient(135deg, #1e1b4b, #4c1d95);
      border: 2px solid var(--gold);
      border-radius: 36px;
      padding: 44px;
      width: 92%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(251,191,36,0.5);
      animation: pop 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    body.light-mode .payment-modal {
      background: linear-gradient(135deg, #f3e8ff, #e0d4ff);
      color: #1e293b;
      border: 2px solid #d946ef;
    }

    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .bank-details {
      background: rgba(255,255,255,0.1);
      padding: 32px;
      border-radius: 28px;
      margin: 35px 0;
      line-height: 2.6;
      font-size: 21px;
      border: 1px dashed rgba(251,191,36,0.4);
    }
    body.light-mode .bank-details {
      background: rgba(139,92,246,0.1);
      color: #1e293b;
    }

    .paid-btn {
      background: linear-gradient(135deg, #10b981, #34d399);
      color: white;
      border: none;
      padding: 22px;
      width: 100%;
      border-radius: 50px;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 25px;
    }

    .spinner {
      width: 100px; height: 100px;
      border: 12px solid rgba(255,255,255,0.2);
      border-top: 12px solid var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }

    .countdown {
      font-size: 62px;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(251,191,36,0.7);
    }

    .success-screen h2 {
      font-size: 38px;
      margin: 25px 0;
      color: #10b981;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ================= RESPONSIVE PERFECTION ================= */
    @media (max-width: 480px) {
      header { padding: 50px 20px 40px; }
      .crown { font-size: 90px; }
      h1 { font-size: 34px; }
      .price { font-size: 64px; }
      .btn-pay { font-size: 22px; padding: 22px; width: 92%; }
      .payment-modal { padding: 36px; }
      .bank-details { padding: 24px; font-size: 19px; }
    }

    @media (max-width: 360px) {
      h1 { font-size: 30px; }
      .price { font-size: 56px; }
      .countdown { font-size: 52px; }
    }

    /* Input zoom fix */
    input, button { font-size: max(16px, 1em) !important; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <i class="fas fa-crown crown"></i>
    <h1>Lifetime VIP</h1>
    <div class="badge">LIMITED TIME OFFER</div>
  </header>

  <div class="features">
    <div class="feature"><i class="fas fa-eye"></i> <div><strong>See Who Sent Messages</strong></div></div>
    <div class="feature"><i class="fas fa-infinity"></i> <div><strong>Unlimited Reveals</strong></div></div>
    <div class="feature"><i class="fas fa-gem"></i> <div><strong>VIP Badge Forever</strong></div></div>
    <div class="feature"><i class="fas fa-coins"></i> <div><strong>+2000 Coins Bonus</strong></div></div>
  </div>

  <div class="price-box">
    <div class="old-price">₦5,000</div>

    <p style="margin-top:15px;font-size:18px;">One-Time Payment • Never Pay Again</p>
  </div>

  <button class="btn-pay" id="payPremium">
    Pay ₦2,000 & Unlock Lifetime VIP Forever
  </button>

  <div class="info">

    Manual Transfer • Instant Activation After Verification • 100% Safe<br>
    One payment = VIP + 2000 coins forever!
  </div>
</div>

<div id="modalContainer"></div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ====================== SUPABASE ====================== */
const SUPABASE_URL = 'https://ssyaklpnjhoxukfanyxb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWFrbHBuamhveHVrZmFueXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjA2NzUsImV4cCI6MjA5NjczNjY3NX0.H95B092ZXEAQz3l6-QefzWt44RZLpp5PdiEbLktstGE';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.supabase = supabase;


  const params = new URLSearchParams(location.search);
const username = params.get('user');

if (!username) {
  alert("Invalid access");
  window.location.href = "dashboard.html";
}

  const modalContainer = document.getElementById('modalContainer');

  document.getElementById('payPremium').onclick = async () => {
    const { error } = await supabase.from('manual_payments').insert({
      username,
      payment_type: 'lifetime_premium',
      amount: 2000,
      coin_amount: 2000,
      status: 'pending'
    });

    if (error) {
      alert("Error creating payment");
      console.error(error);
      return;
    }

    showPaymentModal();
  };

  function showPaymentModal() {
    modalContainer.innerHTML = `
      <div class="payment-modal">
        <h2>Lifetime VIP Payment</h2>
        
        <div class="bank-details">
          <p><strong>Bank:</strong> Opay</p>
          <p><strong>Account Name:</strong>Blessing Joshua Ogundele</p>
          <p><strong>Account Number:</strong> Account Number: 651 854 6439</p>
          <p><strong>Amount:</strong> <span style="color:var(--gold);font-size:32px;font-weight:bold;">₦2,000</span></p>
        </div>

        <button class="paid-btn" id="paidBtn">I’ve Made Payment</button>

        <div style="display:none;margin-top:30px;">
          <p style="font-size:19px;">Verifying your payment...</p>
          <div class="spinner"></div>
          <p class="countdown">30:00</p>
          <p style="margin-top:30px;opacity:0.9;">Do not close this page until confirmed</p>
        </div>
      </div>
    `;
    modalContainer.classList.add('active');

    document.getElementById('paidBtn').onclick = () => {
      document.querySelector('.bank-details').style.display = 'none';
      document.querySelector('div[style*="display:none"]').style.display = 'block';
      startCountdown();
    };
  }

  function startCountdown() {
    let seconds = 1800;
    const timerEl = document.querySelector('.countdown');
    const interval = setInterval(() => {
      const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secs = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `${mins}:${secs}`;
      if (--seconds < 0) clearInterval(interval);
    }, 1000);

    const poll = setInterval(async () => {
      const { data } = await supabase
        .from('manual_payments')
        .select('status')
        .eq('username', username)
        .eq('payment_type', 'lifetime_premium')
        .eq('status', 'confirmed')
        .limit(1);

      if (data && data.length > 0) {
        clearInterval(interval);
        clearInterval(poll);
        modalContainer.innerHTML = `
          <div class="payment-modal success-screen">
            <div style="font-size:80px;">👑</div>
            <h2>LIFETIME VIP UNLOCKED!</h2>
            <p style="font-size:20px;">Welcome forever + 2000 coins added</p>
            <p style="color:var(--green);margin-top:30px;">Redirecting to dashboard...</p>
          </div>
        `;
        setTimeout(() => location.href = `dashboard.html?user=${username}`, 4000);
      }
    }, 8000);
  }
</script>
</body>
</html>
