<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Manual Payments</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
<style>
  :root { --purple: #8b5cf6; --gold: #fbbf24; --green: #10b981; --red: #ef4444; --orange: #ffaa00; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f23; color: white; min-height: 100vh; padding: 15px; }

  #passwordScreen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
  .pass-box { background: linear-gradient(135deg, #1e1b4b, #4c1d95); padding: 40px 30px; border-radius: 24px; text-align: center; box-shadow: 0 0 60px rgba(139,92,246,0.6); width: 90%; max-width: 380px; }
  .pass-box input { width: 100%; padding: 16px; font-size: 18px; border-radius: 12px; border: none; margin: 15px 0; text-align: center; background: rgba(255,255,255,0.1); color: white; }
  .pass-box button { background: var(--green); color: white; padding: 16px 40px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; width: 100%; }

  .header { text-align: center; margin: 20px 0; }
  .header h1 { font-size: 36px; background: linear-gradient(90deg, var(--purple), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* SEARCH BAR */
  .search-box { margin: 20px 0; text-align: center; }
  .search-box input { width: 100%; max-width: 500px; padding: 16px 20px; border-radius: 50px; border: none; background: rgba(255,255,255,0.1); color: white; font-size: 18px; text-align: center; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin: 25px 0; }
  .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 16px; text-align: center; backdrop-filter: blur(10px); }
  .stat-card h3 { font-size: 14px; opacity: 0.9; margin-bottom: 8px; }
  .stat-number { font-size: 36px; font-weight: bold; }

  table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; font-size: 14px; margin-top: 10px; }
  th { background: var(--purple); padding: 14px 10px; text-align: left; font-size: 13px; font-weight: bold; }
  td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); word-break: break-word; }
  tr:hover { background: rgba(139,92,246,0.2); }

  .btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; margin: 3px; transition: all 0.3s; }
  .btn-confirm { background: var(--green); color: white; }
  .btn-confirm:hover { background: #059669; }
  .btn-reject { background: var(--red); color: white; }
  .btn-reject:hover { background: #dc2626; }

  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #222; padding: 16px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; opacity: 0; transition: all 0.4s; display: flex; align-items: center; gap: 12px; font-size: 18px; }
  #toast.show { opacity: 1; bottom: 50px; }
  #toast.success { border: 2px solid var(--green); }
  #toast.error { border: 2px solid var(--red); }

  #confirmModal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
  .modal-box { background: linear-gradient(135deg, #1e1b4b, #4c1d95); padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; border: 2px solid var(--gold); box-shadow: 0 0 60px rgba(251,191,36,0.4); }
  .modal-box button { margin: 10px; padding: 14px 32px; border-radius: 50px; font-size: 16px; font-weight: bold; }

  @media (max-width: 768px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead tr { display: none; }
    tr { margin: 15px 0; border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; padding: 15px; background: rgba(255,255,255,0.05); }
    td { border: none; position: relative; padding-left: 50%; text-align: right; padding: 8px 0; }
    td:before { position: absolute; left: 15px; width: 45%; padding-right: 10px; white-space: nowrap; font-weight: bold; content: attr(data-label); text-align: left; opacity: 0.9; }
    td[data-label="Action"] { padding-left: 15px; text-align: center; }
    td[data-label="Action"]::before { display: none; }
  }
</style>
</head>
<body>

<!-- PASSWORD SCREEN -->
<div id="passwordScreen">
  <div class="pass-box">
    <h1>Admin Access</h1>
    <p>Type the secret key</p>
    <input type="password" id="secretKey" placeholder="Enter secret key">
    <button id="enterBtn">Enter Admin</button>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="adminDashboard" style="display:none;">
  <div class="header">
    <h1>Manual Payments Admin</h1>
    <p>Verify payments • Activate VIP • Track earnings</p>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search by username, amount, or type...">
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <h3>Active Pending</h3>
      <div class="stat-number" style="color:var(--orange);" id="activePending">0</div>
    </div>
    <div class="stat-card">
      <h3>Total Pending</h3>
      <div class="stat-number" style="color:orange;" id="totalPending">0</div>
    </div>
    <div class="stat-card">
      <h3>Confirmed</h3>
      <div class="stat-number" style="color:lime;" id="totalConfirmed">0</div>
    </div>
    <div class="stat-card">
      <h3>Total Earnings</h3>
      <div class="stat-number" style="color:var(--green);" id="totalEarnings">₦0</div>
    </div>
  </div>

  <!-- TABLE -->
  <table id="paymentsTable">
    <thead>
      <tr>
        <th>Date & Time</th>
        <th>User</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Coins</th>
        <th>Timer</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- TOAST -->
<div id="toast"><span id="toastMsg">Success!</span></div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
  <div class="modal-box">
    <h3>Confirm Action</h3>
    <p id="confirmText">Are you sure?</p>
    <button class="btn btn-confirm" id="confirmYes">Yes, Confirm</button>
    <button class="btn btn-reject" id="confirmNo">Cancel</button>
  </div>
</div>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

/* ====================== SUPABASE ====================== */
const SUPABASE_URL = 'https://ssyaklpnjhoxukfanyxb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzeWFrbHBuamhveHVrZmFueXhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNjA2NzUsImV4cCI6MjA5NjczNjY3NX0.H95B092ZXEAQz3l6-QefzWt44RZLpp5PdiEbLktstGE';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
window.supabase = supabase;

// TOAST
function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.className = type;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

// PASSWORD CHECK
document.getElementById('enterBtn').addEventListener('click', () => {
  if (document.getElementById('secretKey').value.trim() === 'Joshua02$$') {
    document.getElementById('passwordScreen').style.display = 'none';
    document.getElementById('adminDashboard').style.display = 'block';
    loadPayments();
  } else {
    showToast("Wrong password!", "error");
  }
});

// FORMAT TIME LEFT
function getTimeLeft(created_at) {
  const elapsed = Math.floor((Date.now() - new Date(created_at).getTime()) / 1000);
  const remaining = 1800 - elapsed;
  if (remaining <= 0) return '<span style="color:#ff4444;font-weight:bold;">EXPIRED</span>';
  const mins = String(Math.floor(remaining / 60)).padStart(2, '0');
  const secs = String(remaining % 60).padStart(2, '0');
  return `<span style="color:#ffaa00;font-weight:bold;">${mins}:${secs}</span>`;
}

// LOAD PAYMENTS
async function loadPayments() {
  const { data: payments, error } = await supabase
    .from('manual_payments')
    .select('*')
    .order('created_at', { ascending: false });

  if (error || !payments) return showToast("Failed to load", "error");

  const usernames = [...new Set(payments.map(p => p.username).filter(Boolean))];
  const { data: profiles } = await supabase
    .from('profiles')
    .select('username, full_name')
    .in('username', usernames.length > 0 ? usernames : ['none']);

  const nameMap = {};
  profiles?.forEach(p => nameMap[p.username] = p.full_name?.trim() || p.username);

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let pending = 0, activePending = 0, confirmed = 0, earnings = 0;

  payments.forEach(p => {
    const isExpired = (Date.now() - new Date(p.created_at).getTime()) / 1000 > 1800;
    const status = p.status;

    if (status === 'pending') {
      pending++;
      if (!isExpired) activePending++;
    }
    if (status === 'confirmed') {
      confirmed++;
      earnings += p.amount;
    }

    const fullName = nameMap[p.username] || p.username;

    // CORRECT COIN CALCULATION (only for display!)
    let displayCoins = p.coin_amount;
    if (displayCoins == null) {
      displayCoins = p.payment_type === 'lifetime_premium' ? 2000 : Math.floor(p.amount / 10); // ← Change /10 if your ratio is different
    }

    const timeLeft = status === 'pending' ? getTimeLeft(p.created_at) : '—';

    const row = document.createElement('tr');
if (isExpired && status === 'pending') row.style.background = 'rgba(255,68,68,0.15)';

    row.innerHTML = `
      <td data-label="Date">${new Date(p.created_at).toLocaleDateString()} <br><small>${new Date(p.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small></td>
      <td data-label="User"><strong>${fullName}</strong><br><small>@${p.username}</small></td>
      <td data-label="Type">${p.payment_type === 'lifetime_premium' ? 'Lifetime VIP' : 'Buy Coins'}</td>
      <td data-label="Amount">₦${p.amount.toLocaleString()}</td>
      <td data-label="Coins">${displayCoins.toLocaleString()}</td>
      <td data-label="Timer">${timeLeft}</td>
      <td data-label="Status">
        <span style="padding:6px 12px;border-radius:8px;font-weight:bold;background:${status==='confirmed'?'#90ee90':status==='rejected'?'#ff6b6b':isExpired?'#ff4444':'#ffd93d'};color:#000;">
          ${status.toUpperCase()}${isExpired && status==='pending' ? ' (EXPIRED)' : ''}
        </span>
      </td>
      <td data-label="Action">
        ${status === 'pending' ? `
          <button class="btn btn-confirm" data-id="${p.id}" data-user="${p.username}" data-coins="${displayCoins}" data-type="${p.payment_type}">
            ${isExpired ? 'Verify Anyway' : 'Verify Now'}
          </button>
          <button class="btn btn-reject" data-id="${p.id}">Reject</button>
        ` : status === 'confirmed' ? '<span style="color:lime;font-weight:bold;">✓ Verified</span>' : '<span style="opacity:0.6;">Rejected</span>'}
      </td>
    `;
    tbody.appendChild(row);
  });

  document.getElementById('activePending').textContent = activePending;
  document.getElementById('totalPending').textContent = pending;
  document.getElementById('totalConfirmed').textContent = confirmed;
  document.getElementById('totalEarnings').textContent = `₦${earnings.toLocaleString()}`;

  // Attach buttons
  document.querySelectorAll('.btn-confirm').forEach(btn => {
    btn.onclick = () => {
      const d = btn.dataset;
      showConfirm(`Verify payment for @${d.user}?<br><small>Will credit ${d.coins} coins via database trigger</small>`, 
        () => verifyPaymentOnly(d.id, d.user));
    };
  });

  document.querySelectorAll('.btn-reject').forEach(btn => {
    btn.onclick = () => showConfirm("Reject this payment permanently?", () => rejectPayment(btn.dataset.id));
  });
}

// MODAL
function showConfirm(text, callback) {
  document.getElementById('confirmText').innerHTML = text;
  document.getElementById('confirmModal').style.display = 'flex';
  document.getElementById('confirmYes').onclick = () => {
    document.getElementById('confirmModal').style.display = 'none';
    callback();
  };
  document.getElementById('confirmNo').onclick = () => document.getElementById('confirmModal').style.display = 'none';
}

// VERIFY PAYMENT — NOW ONLY UPDATES manual_payments (coins handled by trigger!)
async function verifyPaymentOnly(id, username) {
  const { error } = await supabase
    .from('manual_payments')
    .update({ 
      status: 'confirmed', 
      verified_at: new Date().toISOString(),
      verified_by: 'admin' // optional
    })
    .eq('id', id);

  if (error) {
    console.error(error);
    showToast("Failed to confirm", "error");
  } else {
    showToast(`✅ Payment confirmed! Coins will be added automatically.`, "success");
    loadPayments();
  }
}

// REJECT
async function rejectPayment(id) {
  const { error } = await supabase
    .from('manual_payments')
    .update({ status: 'rejected' })
    .eq('id', id);

  showToast(error ? "Reject failed" : "Payment rejected", error ? "error" : "error");
  loadPayments();
}

// SEARCH & AUTO REFRESH
document.getElementById('searchInput')?.addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  document.querySelectorAll('#tableBody tr').forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
  });
});

setInterval(() => {
  if (document.getElementById('adminDashboard').style.display === 'block') loadPayments();
}, 20000);

loadPayments();
</script>
</body>
</html>
