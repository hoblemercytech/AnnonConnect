<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Admin Dashboard</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
</head>
<body class="h-full">

<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-600 to-purple-700 p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Admin Login</h2>
    <input type="password" id="adminKey" placeholder="Enter admin key" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
    <button id="loginBtn" class="mt-6 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition">Login</button>
  </div>
</div>

<div id="dashboard" class="hidden min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-4xl font-bold text-gray-900 mb-8">Admin Dashboard</h1>

    <div class="flex flex-wrap gap-2 mb-8 border-b border-gray-200">
      <button onclick="showTab('inquiries')" class="tab-btn active px-6 py-3 font-medium text-indigo-600 border-b-2 border-indigo-600">Inquiries</button>
      <button onclick="showTab('profiles')" class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-indigo-600">Profiles</button>
   <button onclick="showTab('messages')" class="tab-btn px-6 py-3 font-medium text-gray-600 hover:text-indigo-600 transition">
Messages <span id="messagesCountBadge" class="ml-2 px-2 py-1 text-xs font-bold bg-indigo-100 text-indigo-800 rounded-full hidden"></span>
</button>
    </div>

    <!-- Inquiries -->
    <div id="inquiriesTab" class="tab-content">
      <div id="inquiriesLoading" class="text-center py-20"><div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div></div>
      <div id="inquiriesContainer" class="hidden space-y-6">
        <div class="hidden md:block bg-white shadow-lg rounded-xl overflow-hidden">
          <table class="w-full"><thead class="bg-gray-900 text-white"><tr><th class="px-6 py-4 text-left">ID</th><th>Name</th><th>Contact</th><th>Message</th><th>Status</th><th>Priority</th><th>Action</th></tr></thead><tbody id="inquiryTable" class="divide-y divide-gray-200"></tbody></table>
        </div>
        <div id="inquiryMobileCards" class="md:hidden space-y-4"></div>
      </div>
    </div>

    <!-- Profiles + Search + Delete -->
    <div id="profilesTab" class="tab-content hidden">
      <input type="text" id="profileSearch" placeholder="Search username, name, email, phone..." class="mb-6 w-full max-w-xl px-5 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none" onkeyup="searchProfiles()">
      <div id="profilesLoading" class="text-center py-20"><div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent"></div></div>
      <div id="profilesContainer" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- Messages Tab Content -->
<div id="messagesTab" class="tab-content hidden">
  <!-- Loading Spinner -->
  <div id="messagesLoading" class="text-center py-20">
    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
    <p class="mt-4 text-gray-600 font-medium">Loading messages...</p>
  </div>

  <!-- Main Container (hidden until loaded) -->
  <div id="messagesContainer" class="hidden max-w-5xl mx-auto px-4">
    <!-- Search Bar + Stats -->
    <div class="bg-white rounded-xl shadow-md p-6 mb-8 sticky top-4 z-10 border border-gray-200">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex-1">
          <input 
            type="text" 
            id="messagesSearch" 
            placeholder="🔍 Search by username, message content, or media type..." 
            class="w-full px-5 py-4 text-lg border-2 border-gray-300 rounded-xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition"
            onkeyup="filterMessages()"
          >
        </div>
        <div class="text-right">
          <p class="text-sm text-gray-500">Total messages</p>
          <p id="totalMessagesCount" class="text-2xl font-bold text-indigo-600">0</p>
        </div>
      </div>
    </div>

    <!-- Messages List -->
    <div id="messagesList" class="space-y-6">
      <!-- Messages will be injected here by JavaScript -->
    </div>

    <!-- Empty State -->
    <div id="noMessages" class="text-center py-20 hidden">
      <div class="text-6xl mb-6">💬</div>
      <p class="text-xl text-gray-500">No messages found</p>
      <p class="text-gray-400 mt-2">Try adjusting your search or wait for new messages.</p>
    </div>
  </div>
</div>
  </div>
</div>

<!-- Modals -->
<div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
    <h3 class="text-2xl font-bold text-red-600 mb-4">Permanently Delete User?</h3>
    <p class="text-gray-700 mb-8">Delete <strong id="deleteUsername"></strong> and all their data?</p>
    <div class="flex gap-4">
      <button onclick="confirmDelete()" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg">Delete Forever</button>
      <button onclick="closeDeleteModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-lg">Cancel</button>
    </div>
  </div>
</div>

<div id="replyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
    <h3 class="text-2xl font-bold mb-4">Send Reply</h3>
    <textarea id="replyMessage" rows="5" placeholder="Your reply..." class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
    <div class="flex gap-3 mt-6">
      <button id="sendReplyBtn" onclick="sendReply()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg">Send</button>
      <button onclick="closeModal()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-3 rounded-lg">Cancel</button>
    </div>
  </div>
</div>
<script type="module">

function initApp() {
  let allProfiles = [];
  let currentInquiry = null;
  let profileToDelete = null;
  

// === Safe HTML Escape ===
const escapeHtml = (unsafe) => {
  if (unsafe === null || unsafe === undefined) return '';
  
  return String(unsafe)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;")
    .replace(/\//g, "&#x2F;"); // optional: escape slashes to prevent closing tags in injected HTML
};

  // === Admin Login ===
  document.getElementById('loginBtn')?.addEventListener('click', () => {
    const key = document.getElementById('adminKey').value.trim();
    if (btoa(key) === 'am9zaHVhMDIkJA==') { // joshua02$#
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      showTab('inquiries');
    } else {
      console.log('Wrong admin key!');
    }
  });

  // === Tab System ===
  window.showTab = async (tab) => {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.remove('text-indigo-600', 'border-indigo-600', 'font-bold');
      btn.classList.add('text-gray-600');
    });

    document.getElementById(tab + 'Tab').classList.remove('hidden');
    const activeBtn = document.querySelector(`button[onclick="showTab('${tab}')"]`);
    if (activeBtn) activeBtn.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600', 'font-bold');

    if (tab === 'inquiries') await loadInquiries();
    if (tab === 'profiles') await loadProfiles();
    if (tab === 'messages') await loadMessages();
  };
  
  // Update messages count badge when loading
async function updateMessagesCount() {
  try {
    const { count } = await window.supabaseClient
      .from('messages')
      .select('*', { count: 'exact', head: true });
    
    const badge = document.getElementById('messagesCountBadge');
    const counter = document.getElementById('totalMessagesCount');
    
    if (count > 0) {
      badge.textContent = count > 999 ? '999+' : count;
      badge.classList.remove('hidden');
      if (counter) counter.textContent = count.toLocaleString();
    }
  } catch (err) {
    console.log('Could not fetch message count');
  }
}
// Call this after loadMessages()
setTimeout(updateMessagesCount, 1000); // or call it inside loadMessages() when data loads

  // === INQUIRIES ===
  async function loadInquiries() {
    const container = document.getElementById('inquiriesContainer');
    const spinner = document.getElementById('inquiriesLoading');
    spinner.classList.remove('hidden');
    container.classList.add('hidden');
    container.innerHTML = '';

    try {
      const { data, error } = await window.supabaseClient
        .from('inquiries')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;
      if (!data || data.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-12 text-xl">No inquiries found.</p>';
        return;
      }

      data.forEach(inquiry => {
        const userId = inquiry.chat_user_id || inquiry.local_user_id || '';
        const card = document.createElement('div');
        card.className = 'bg-white rounded-xl shadow p-6 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6';

        card.innerHTML = `
          <div class="flex-1 space-y-3">
            <p><span class="font-bold">ID:</span> ${inquiry.id}</p>
            <p><span class="font-bold">Name:</span> ${escapeHtml(inquiry.name)}</p>
            <p><span class="font-bold">Contact:</span> ${escapeHtml(inquiry.contact)}</p>
            <p><span class="font-bold">Message:</span> ${escapeHtml(inquiry.message)}</p>
            <p><span class="font-bold">Status:</span>
              <span class="px-3 py-1 rounded text-sm font-medium ${inquiry.status === 'Replied' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                ${escapeHtml(inquiry.status || 'Pending')}
              </span>
            </p>
            ${inquiry.admin_reply ? `
              <div class="mt-4 pt-4 border-t border-gray-200">
                <span class="font-bold">Your Reply:</span><br>
                <p class="mt-2 text-gray-700 whitespace-pre-wrap">${escapeHtml(inquiry.admin_reply)}</p>
              </div>` : ''}
          </div>
          <div>
            ${inquiry.status !== 'Replied' ? `
              <button onclick="openReplyModal(${inquiry.id}, '${userId.replace(/'/g, "\\'")}')"
                class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition shadow">
                Reply
              </button>
            ` : `<span class="text-green-600 font-bold text-lg">✓ Replied</span>`}
          </div>
        `;
        container.appendChild(card);
      });
    } catch (err) {
      console.error('Load inquiries error:', err);
      container.innerHTML = '<p class="text-red-600 text-center py-12">Failed to load inquiries.</p>';
    } finally {
      spinner.classList.add('hidden');
      container.classList.remove('hidden');
    }
  }

  window.openReplyModal = (inquiryId, userId) => {
    currentInquiry = { id: inquiryId, userId };
    document.getElementById('replyMessage').value = '';
    document.getElementById('replyModal').classList.remove('hidden');
  };

  window.closeModal = () => {
    document.getElementById('replyModal').classList.add('hidden');
    currentInquiry = null;
  };

  window.sendReply = async () => {
    const replyText = document.getElementById('replyMessage').value.trim();
    if (!replyText) return alert('Please write a reply message.');
    if (!currentInquiry) return alert('No inquiry selected.');

    const sendBtn = document.getElementById('sendReplyBtn');
    const origText = sendBtn.textContent;
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';

    try {
      const { error: updErr } = await window.supabaseClient
        .from('inquiries')
        .update({
          admin_reply: replyText,
          status: 'Replied',
          replied_at: new Date().toISOString()
        })
        .eq('id', currentInquiry.id);

      if (updErr) throw updErr;

      if (currentInquiry.userId) {
        const payload = {
          title: 'Inquiry solved',
          message: replyText,
          created_at: new Date().toISOString()
        };
        if (currentInquiry.userId.startsWith('local_')) {
          payload.local_user_id = currentInquiry.userId;
        } else {
          payload.chat_user_id = currentInquiry.userId;
        }
        await window.supabaseClient.from('notifications').insert(payload);
      }

      alert('✅ Reply sent successfully!');
      closeModal();
      await loadInquiries();
    } catch (err) {
      console.error('Send reply error:', err);
      alert('Failed to send reply: ' + (err.message || 'Unknown error'));
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = origText;
    }
  };


// === Load Profiles ===
async function loadProfiles() {
const container = document.getElementById('profilesContainer');
const spinner = document.getElementById('profilesLoading');
spinner.classList.remove('hidden');
container.classList.add('hidden');
container.innerHTML = '';

try {
const { data, error } = await window.supabaseClient
.from('profiles')
.select('*')
.order('created_at', { ascending: false });

if (error) throw error;

allProfiles = data || [];
renderProfiles(allProfiles);


} catch (err) {
console.error('Load profiles error:', err);
container.innerHTML = '<p class="text-red-600 text-center py-12">Failed to load profiles.</p>';
} finally {

}

// === Render Profiles ===

}

  <div class="p-6">
    <h3 class="font-bold text-xl">${escapeHtml(p.full_name || 'Unnamed User')}</h3>

    <p class="text-gray-600 mt-1">${escapeHtml(p.email || 'No email')}</p>

    <button

      class="delete-user-btn mt-5 w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg transition">

`;

});
}

// === Search Profiles ===
window.searchProfiles = () => {

// === MESSAGES TAB - FULL UPDATED ===
let messagesAllData = [];

// Normalize payload to safely extract media URLs
function extractMediaUrl(msg) {
  if (!msg) return null;
  if (msg.media_url) return msg.media_url;
  if (msg.payload?.url) return msg.payload.url;
  if (msg.payload?.media_url) return msg.payload.media_url;
  if (msg.payload?.file) return msg.payload.file;
  return null;
}

async function loadMessages() {
  const spinner = document.getElementById("messagesLoading");
  const container = document.getElementById("messagesContainer");
  const list = document.getElementById("messagesList");
  const empty = document.getElementById("noMessages");

  spinner.classList.remove("hidden");
  container.classList.add("hidden");
  list.innerHTML = "";
  empty.classList.add("hidden");

  try {
    const { data, error } = await window.supabaseClient
      .from("messages")
      .select("*")
      .order("sent_at", { ascending: false })
      .limit(2000);

    if (error) throw error;

    messagesAllData = data || [];

    spinner.classList.add("hidden");
    container.classList.remove("hidden");

    if (!messagesAllData.length) {
      empty.classList.remove("hidden");
      return;
    }

    renderAllMessages(messagesAllData);
    updateMessagesCount();

  } catch (err) {
    spinner.classList.add("hidden");
    container.classList.remove("hidden");

    list.innerHTML = `
      <div class="text-center py-20 text-red-600">
        <p class="text-xl mb-4">Failed to load messages</p>
        <p class="mb-4">${escapeHtml(err.message)}</p>
        <button onclick="loadMessages()" 
                class="px-6 py-3 bg-indigo-600 text-white rounded-lg">
          Retry
        </button>
      </div>
    `;
  }
}

function filterMessages() {
  const term = (document.getElementById("messagesSearch")?.value || "")
    .toLowerCase()
    .trim();

  const filtered = term
    ? messagesAllData.filter(msg =>
        (msg.to_username || "").toLowerCase().includes(term) ||
        (msg.reply_username || "").toLowerCase().includes(term) ||
        (msg.message || "").toLowerCase().includes(term)
      )
    : messagesAllData;

  renderAllMessages(filtered);

  document.getElementById("messagesCounter").textContent = term
    ? `${filtered.length} of ${messagesAllData.length} messages match`
    : `Loaded: ${messagesAllData.length} messages`;
}

function renderAllMessages(messages) {
  const list = document.getElementById("messagesList");

  if (!messages.length) {
    list.innerHTML = `<p class="text-center text-gray-500 py-16 text-xl">No messages found.</p>`;
    return;
  }

  list.innerHTML = messages.map(msg => {
    const time = new Date(msg.sent_at || msg.inserted_at).toLocaleString();
    const mediaUrl = extractMediaUrl(msg);
    const ext = (msg.extension || "").toLowerCase();

    let mediaBlock = "";
    if (mediaUrl) {
      if (["jpg","jpeg","png","gif","webp"].includes(ext)) {
        mediaBlock = `<div class="my-4 text-center">
          <img src="${mediaUrl}" class="rounded-xl max-h-96 shadow cursor-pointer" 
               onclick="window.open('${mediaUrl}','_blank')" />
        </div>`;
      } else if (["mp4","mov","avi","webm","m4v"].includes(ext)) {
        mediaBlock = `<div class="my-4 text-center">
          <video controls class="rounded-xl max-h-96 shadow w-full">
            <source src="${mediaUrl}">
          </video>
        </div>`;
      } else if (["mp3","aac","wav","ogg"].includes(ext)) {
        mediaBlock = `<div class="my-4 text-center">
          <audio controls class="w-full">
            <source src="${mediaUrl}">
          </audio>
        </div>`;
      }
    }

    return `
      <div class="bg-white rounded-xl shadow-md p-6 mb-5 border-l-4 
        ${msg.reply_username ? "border-indigo-500" : "border-gray-300"}">

        <div class="flex justify-between items-center mb-4">
          <div class="flex items-center gap-3">
            <strong>${msg.reply_username || "Anonymous"}</strong>
            <span class="text-gray-400">→</span>
            <strong class="text-indigo-600">${msg.to_username || "-"}</strong>
          </div>
          <span class="text-sm text-gray-500">${time}</span>
        </div>

        ${mediaBlock}

        ${msg.message ? `
          <p class="bg-gray-50 p-4 rounded-lg whitespace-pre-wrap break-words">
            ${escapeHtml(msg.message)}
          </p>` : ""}
      </div>
    `;
  }).join("");
}

const debouncedFilterMessages = debounce(() => filterMessages(), 200);
function debounce(func, wait) {
  let timeout;
  return () => {
    clearTimeout(timeout);
    timeout = setTimeout(func, wait);
  };
}



  // === Start the app ===
  showTab('inquiries');
}

// Initialize when Supabase is ready
if (window.supabase) {
  initApp();
} else {
  const script = document.querySelector('script[src*="supabase.co"]');
  if (script) script.addEventListener('load', () => setTimeout(initApp, 300));
}
</script>
